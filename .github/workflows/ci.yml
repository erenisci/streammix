name: CI

# Lint + per-language test matrix. One job per component; each is independent
# so a failure in (say) the Go relay does not mask a TypeScript regression.
#
# The Windows publisher (WASAPI + libopus + libwebsockets via vcpkg) is a heavy,
# platform-locked build and is intentionally NOT part of this fast PR gate — it
# gets its own workflow once the vcpkg cache is wired up. Everything here runs on
# ubuntu-latest and finishes in well under a minute.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shared-ts:
    name: shared/ts (typecheck + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        working-directory: shared/ts
        run: npm install --no-audit --no-fund
      - name: Typecheck
        working-directory: shared/ts
        run: npm run typecheck
      - name: Test
        working-directory: shared/ts
        run: npm test

  shared-go:
    name: shared/go (vet + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false # no external deps, no go.sum
      - name: Vet
        working-directory: shared/go
        run: go vet ./...
      - name: Test
        working-directory: shared/go
        run: go test ./...

  shared-cpp:
    name: shared/cpp (build + ctest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        working-directory: shared/cpp
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        working-directory: shared/cpp
        run: cmake --build build --config Release
      - name: Test
        working-directory: shared/cpp
        run: ctest --test-dir build --output-on-failure

  relay:
    name: relay (vet + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: relay/go.sum
      - name: Vet
        working-directory: relay
        run: go vet ./...
      - name: Test
        working-directory: relay
        run: go test ./...

  extension:
    name: extension (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install shared/ts deps
        working-directory: shared/ts
        run: npm install --no-audit --no-fund
      - name: Install extension deps
        working-directory: extension
        run: npm install --no-audit --no-fund
      - name: Typecheck
        working-directory: extension
        run: npm run typecheck
      - name: Build
        working-directory: extension
        run: npm run build
